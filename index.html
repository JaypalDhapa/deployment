<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workers AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d0d0d;
      color: #ececec;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .msg-row {
      display: flex;
      gap: 12px;
      padding: 6px 20px;
      align-items: flex-start;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      margin-top: 2px;
    }

    .avatar.ai   { background: #1e1e1e; border: 1px solid #333; color: #aaa; }
    .avatar.user { background: #19c37d; color: #fff; }

    .bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.7;
    }

    .bubble.ai   { background: #1a1a1a; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; color: #ececec; }
    .bubble.user { background: #19c37d; color: #fff; border-bottom-right-radius: 4px; }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 15px;
      background: #aaa;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #666;
      font-size: 15px;
    }

    .empty-state h1 { font-size: 26px; font-weight: 600; color: #fff; }

    #bottom {
      border-top: 1px solid #2a2a2a;
      padding: 14px 20px 18px;
      background: #0d0d0d;
    }

    #input-box {
      max-width: 780px;
      margin: 0 auto;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 8px 10px 8px 16px;
      transition: border-color 0.15s;
    }

    #input-row:focus-within { border-color: #555; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      color: #ececec;
      resize: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      min-height: 24px;
      overflow-y: auto;
    }

    #user-input::placeholder { color: #555; }

    #send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #19c37d;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { background: #2a2a2a; cursor: default; }
    #send-btn:not(:disabled):hover { opacity: 0.85; }

    #send-btn svg { width: 14px; height: 14px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #444;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <header>Jaypal AI</header>

  <div id="messages">
    <div class="empty-state" id="empty">
      <h1>Jaypal AI</h1>
      <p>How can I help you today?</p>
    </div>
  </div>

  <div id="bottom">
    <div id="input-box">
      <div id="input-row">
        <textarea id="user-input" rows="1" placeholder="Message Jaypal AI..."></textarea>
        <button id="send-btn" disabled>
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M2 8L14 2L10 8L14 14L2 8Z" fill="#fff"/>
          </svg>
        </button>
      </div>
      <p class="hint">Jaypal AI · Streams in real time</p>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://my-backend.jaypaldhapa7990.workers.dev/";

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("user-input");
    const sendBtn    = document.getElementById("send-btn");
    let   emptyEl    = document.getElementById("empty");
    let   isStreaming = false;

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
      sendBtn.disabled = !inputEl.value.trim() || isStreaming;
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) send();
      }
    });

    sendBtn.addEventListener("click", send);

    function addMessage(role, text) {
      if (emptyEl) { emptyEl.remove(); emptyEl = null; }

      const row    = document.createElement("div");
      row.className = `msg-row ${role}`;

      const avatar  = document.createElement("div");
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === "ai" ? "AI" : "You";

      const bubble  = document.createElement("div");
      bubble.className = `bubble ${role}`;
      if (text) bubble.textContent = text;

      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function send() {
      const msg = inputEl.value.trim();
      if (!msg || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = "";
      inputEl.style.height = "auto";

      addMessage("user", msg);

      const aiBubble = addMessage("ai", "");
      const cursor   = document.createElement("span");
      cursor.className = "cursor";
      aiBubble.appendChild(cursor);

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });

        if (!res.ok) throw new Error(`Worker responded with status ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText  = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const raw   = decoder.decode(value, { stream: true });
          const lines = raw.split("\n");

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6).trim();
            if (data === "[DONE]") break;

            try {
              const parsed = JSON.parse(data);
              const token  = parsed.token ?? parsed.response ?? "";
              fullText    += token;
              aiBubble.textContent = fullText;
              aiBubble.appendChild(cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } catch (_) { /* skip malformed lines */ }
          }
        }

        cursor.remove();
        if (!fullText) aiBubble.textContent = "No response received.";

      } catch (err) {
        cursor.remove();
        aiBubble.style.color = "#f87171";
        aiBubble.textContent = "Error: " + err.message;
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
